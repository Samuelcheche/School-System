services:
  - type: web
    name: st-marks-school-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd School-Management-System && python manage.py collectstatic --noinput
    startCommand: cd School-Management-System && python manage.py migrate --noinput && gunicorn sms.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /accounts/login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DJANGO_SETTINGS_MODULE
        value: sms.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,127.0.0.1,localhost"
      - key: SECRET_KEY
        generateValue: true
